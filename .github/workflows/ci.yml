name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libeigen3-dev

      - name: Install system dependencies on macOS
        if: runner.os == 'macOS'
        run: brew install cmake eigen

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Run Python tests
        run: pytest python/tests/ -v

      - name: Install C++ dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build libeigen3-dev

      - name: Install C++ dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja eigen sophus

      - name: Build C++ EKF
        run: |
          cd cpp
          cmake -S . -B build -G Ninja
          cmake --build build

      - name: Run C++ tests
        run: |
          cd cpp
          ./build/test_ekf
